  .p-icon img { border-radius: 8px; height: 50px; margin: 0 auto; display: block; }

  .formkit-form { margin-top: 10px; }
  .formkit-field { flex: 100 1 auto !important; margin-right: 5px !important; }
  .formkit-submit { flex: 1 1 auto !important; margin-left: 5px !important; }

  @media only screen and (max-width: 768px) {
    .details { margin-bottom: 0px; }
    .icons { width: auto; }
    .proj-container .details { width: auto; height: auto; }

function CTAButton({ children }) {
  const handleClick = (e) => {
    e.preventDefault();
    window.Calendly.initPopupWidget({ url: 'https://calendly.com/vineet-sinha/ai-strategy-call' });
  };
  return (
    <a
      href=""
      onClick={handleClick}
      style={{backgroundColor:'#0263E0',color:'#fff',padding:'12px 24px',borderRadius:'5px',fontSize:'16px'}}
    >
      {children}
    </a>
  );
}

function ProjectCarousel({ items }) {
  const [selected, setSelected] = useState(0);

  useEffect(() => {
    const timer = setInterval(() => {
      setSelected(s => (s + 1) % items.length);
    }, 10000);
    return () => clearInterval(timer);
  }, [items]);

  const current = items[selected];

  return (
    <div className="proj-container">
      <div className="icons">
        {items.map((p, i) => (
          <div
            key={i}
            className={'p-icon' + (selected === i ? ' selected' : '')}
            onClick={() => setSelected(i)}
            style={{cursor:'pointer'}}
          >
            <img src={p.image} alt={p.name} />
          </div>
        ))}
        <div className="clearfix" style={{height:'0px'}}>&nbsp;</div>
      </div>
      <div className="details">
        <div style={{marginBottom:'10px'}}><b>{current.name}</b></div>
        <div dangerouslySetInnerHTML={{__html: current.description}} />
      </div>
      <div className="clearfix" style={{height:'0px'}}>&nbsp;</div>
    </div>
  );
}

function NewsletterForm() {
  const containerRef = useRef(null);
  useEffect(() => {
    if (!containerRef.current) return;
    const script = document.createElement('script');
    script.async = true;
    script.setAttribute('data-uid', '0079c9daaf');
    script.src = 'https://exceptional-mover-6501.ck.page/0079c9daaf/index.js';
    containerRef.current.appendChild(script);
  }, []);
  return <div ref={containerRef} />;
}
